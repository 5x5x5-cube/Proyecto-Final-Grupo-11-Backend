apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-gateway
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - path: /auth(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: auth-service
            port:
              number: 80
      - path: /booking(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: booking-service
            port:
              number: 80
      - path: /search(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: search-service
            port:
              number: 80
      - path: /cart(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: cart-service
            port:
              number: 80
      - path: /reports(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: reports-service
            port:
              number: 80
      - path: /inventory(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: inventory-service
            port:
              number: 80
      - path: /commercial(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: commercial-service
            port:
              number: 80
      - path: /notification(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: notification-service
            port:
              number: 80
      - path: /payment(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: payment-service
            port:
              number: 80
      - path: /health-copilot(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: health-copilot
            port:
              number: 80
