apiVersion: v1
kind: ServiceAccount
metadata:
  name: inventory-service-sa
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::618246140762:role/proyecto-final-dev-inventory-service-role
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service
  labels:
    app: inventory-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventory-service
  template:
    metadata:
      labels:
        app: inventory-service
    spec:
      serviceAccountName: inventory-service-sa
      containers:
      - name: inventory-service
        image: 618246140762.dkr.ecr.us-east-1.amazonaws.com/proyecto-final-dev-inventory-service:latest
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: inventory-service-secrets
              key: database-url
        - name: REDIS_URL
          valueFrom:
            configMapKeyRef:
              name: inventory-service-config
              key: redis-url
        - name: SQS_QUEUE_URL
          valueFrom:
            configMapKeyRef:
              name: inventory-service-config
              key: sqs-queue-url
        - name: AWS_REGION
          value: "us-east-1"
        - name: AWS_ENDPOINT_URL
          value: ""
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "192Mi"
            cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: inventory-service
spec:
  selector:
    app: inventory-service
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: ClusterIP

