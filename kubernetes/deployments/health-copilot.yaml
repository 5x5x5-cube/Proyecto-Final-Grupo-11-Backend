apiVersion: apps/v1
kind: Deployment
metadata:
  name: health-copilot
  labels:
    app: health-copilot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: health-copilot
  template:
    metadata:
      labels:
        app: health-copilot
    spec:
      containers:
      - name: health-copilot
        image: 618246140762.dkr.ecr.us-east-1.amazonaws.com/proyecto-final-dev/health-copilot:latest
        ports:
        - containerPort: 8000
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: health-copilot
spec:
  selector:
    app: health-copilot
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: ClusterIP

