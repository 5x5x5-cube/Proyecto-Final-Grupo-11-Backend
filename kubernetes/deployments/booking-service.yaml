apiVersion: v1
kind: ServiceAccount
metadata:
  name: booking-service-sa
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::618246140762:role/proyecto-final-dev-booking-service-role
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: booking-service
  labels:
    app: booking-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: booking-service
  template:
    metadata:
      labels:
        app: booking-service
    spec:
      serviceAccountName: booking-service-sa
      containers:
      - name: booking-service
        image: 618246140762.dkr.ecr.us-east-1.amazonaws.com/proyecto-final-dev-booking-service:latest
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: booking-service-secrets
              key: database-url
        - name: REDIS_URL
          valueFrom:
            configMapKeyRef:
              name: shared-infra-config
              key: redis-url
        - name: INVENTORY_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: shared-service-discovery
              key: inventory-service-url
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "130m"
---
apiVersion: v1
kind: Service
metadata:
  name: booking-service
spec:
  selector:
    app: booking-service
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: ClusterIP
