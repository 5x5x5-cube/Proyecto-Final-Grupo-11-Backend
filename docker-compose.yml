version: '3.8'

services:
  gateway-service:
    build:
      context: ./services/gateway_service
      dockerfile: Dockerfile
    ports:
      - "8090:8000"
    environment:
      - BOOKING_SERVICE_URL=http://booking-service:8000
      - CART_SERVICE_URL=http://cart-service:8000
      - SEARCH_SERVICE_URL=http://search-service:8000
      - DEFAULT_USER_ID=c1000000-0000-0000-0000-000000000001
      # Descomentar a medida que se implementen los servicios:
      # - AUTH_SERVICE_URL=http://auth-service:8000
      # - PAYMENT_SERVICE_URL=http://payment-service:8000
      # - REPORTS_SERVICE_URL=http://reports-service:8000
      # - NOTIFICATION_SERVICE_URL=http://notification-service:8000
      # - MONITOR_SERVICE_URL=http://health-copilot:8000
    depends_on:
      - booking-service
      - cart-service
      - search-service
    networks:
      - microservices

  auth-service:
    build:
      context: ./services/auth_service
      dockerfile: Dockerfile
    ports:
      - "8011:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/travelhub
    depends_on:
      - postgres
    networks:
      - microservices

  booking-service:
    build:
      context: ./services/booking_service
      dockerfile: Dockerfile
    ports:
      - "8002:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/travelhub
      - REDIS_URL=redis://redis:6379/0
      - INVENTORY_SERVICE_URL=http://inventory-service:8000
    depends_on:
      - postgres
      - redis
      - inventory-service
    networks:
      - microservices

  search-service:
    build:
      context: ./services/search_service
      dockerfile: Dockerfile
    ports:
      - "8003:8000"
    environment:
      - REDIS_URL=redis://redis:6379
      - AWS_ENDPOINT_URL=http://localstack:4566
      - SQS_QUEUE_URL=http://localstack:4566/000000000000/hotel-sync-queue
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
    depends_on:
      - redis
      - localstack
    networks:
      - microservices

  search-worker:
    build:
      context: ./services/search_service
      dockerfile: Dockerfile
    command: python workers/sqs_worker.py
    environment:
      - REDIS_URL=redis://redis:6379
      - AWS_ENDPOINT_URL=http://localstack:4566
      - SQS_QUEUE_URL=http://localstack:4566/000000000000/hotel-sync-queue
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
    depends_on:
      - redis
      - localstack
    networks:
      - microservices

  cart-service:
    build:
      context: ./services/cart_service
      dockerfile: Dockerfile
    ports:
      - "8004:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/travelhub
      - REDIS_URL=redis://redis:6379/0
      - INVENTORY_SERVICE_URL=http://inventory-service:8000
    depends_on:
      - postgres
      - redis
      - inventory-service
    networks:
      - microservices

  reports-service:
    build:
      context: ./services/reports_service
      dockerfile: Dockerfile
    ports:
      - "8005:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/travelhub
    depends_on:
      - postgres
    networks:
      - microservices

  inventory-service:
    build:
      context: ./services/inventory_service
      dockerfile: Dockerfile
    ports:
      - "8006:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/travelhub
      - REDIS_URL=redis://redis:6379/0
      - AWS_ENDPOINT_URL=http://localstack:4566
      - SQS_QUEUE_URL=http://localstack:4566/000000000000/hotel-sync-queue
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
    depends_on:
      - postgres
      - localstack
      - redis
    networks:
      - microservices

  commercial-service:
    build:
      context: ./services/commercial_service
      dockerfile: Dockerfile
    ports:
      - "8007:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/travelhub
    depends_on:
      - postgres
    networks:
      - microservices

  notification-service:
    build:
      context: ./services/notification_service
      dockerfile: Dockerfile
    ports:
      - "8008:8000"
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    networks:
      - microservices

  payment-service:
    build:
      context: ./services/payment_service
      dockerfile: Dockerfile
    ports:
      - "8009:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/travelhub
    depends_on:
      - postgres
    networks:
      - microservices

  health-copilot:
    build:
      context: ./services/health_copilot
      dockerfile: Dockerfile
    ports:
      - "8010:8000"
    networks:
      - microservices

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=travelhub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - microservices

  redis:
    image: redis/redis-stack:latest
    ports:
      - "6379:6379"
      - "8001:8001"
    volumes:
      - redis_data:/data
    networks:
      - microservices

  localstack:
    image: localstack/localstack:2.3.0
    ports:
      - "4566:4566"
    environment:
      - SERVICES=sqs
      - DEBUG=1
      - DATA_DIR=/tmp/localstack/data
    volumes:
      - "./scripts/localstack:/etc/localstack/init/ready.d"
    networks:
      - microservices

volumes:
  postgres_data:
  redis_data:

networks:
  microservices:
    driver: bridge
