name: CI - Lint and Test

on:
  push:
    branches: [ main, develop, feature/** ]
  pull_request:
    branches: [ main, develop ]

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4
      
      - uses: dorny/paths-filter@v2
        id: filter
        with:
          filters: |
            auth_service:
              - 'services/auth_service/**'
            booking_service:
              - 'services/booking_service/**'
            search_service:
              - 'services/search_service/**'
            cart_service:
              - 'services/cart_service/**'
            reports_service:
              - 'services/reports_service/**'
            inventory_service:
              - 'services/inventory_service/**'
            commercial_service:
              - 'services/commercial_service/**'
            notification_service:
              - 'services/notification_service/**'
            payment_service:
              - 'services/payment_service/**'
            health_copilot:
              - 'services/health_copilot/**'

  lint-and-test:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.services != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: ${{ fromJSON(needs.detect-changes.outputs.services) }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      
      - name: Cache Poetry dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pypoetry
          key: ${{ runner.os }}-poetry-${{ hashFiles(format('services/{0}/poetry.lock', matrix.service)) }}
          restore-keys: |
            ${{ runner.os }}-poetry-
      
      - name: Install dependencies
        working-directory: services/${{ matrix.service }}
        run: poetry install --no-root
      
      - name: Run Black (format check)
        working-directory: services/${{ matrix.service }}
        run: poetry run black --check .
      
      - name: Run isort (import check)
        working-directory: services/${{ matrix.service }}
        run: poetry run isort --check-only .
      
      - name: Run Flake8 (linting)
        working-directory: services/${{ matrix.service }}
        run: poetry run flake8 app/ tests/
      
      - name: Run Bandit (security)
        working-directory: services/${{ matrix.service }}
        run: poetry run bandit -r app/
      
      - name: Run Tests
        working-directory: services/${{ matrix.service }}
        run: poetry run pytest --cov=app --cov-report=xml --cov-report=term
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: services/${{ matrix.service }}/coverage.xml
          flags: ${{ matrix.service }}
          name: ${{ matrix.service }}

  commitlint:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Validate commit messages
        run: |
          COMMITS=$(git log --format=%s ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }})
          PATTERN='^(feat|fix|docs|style|refactor|test|chore|revert|ci)(\(.+\))?: .+'
          FAILED=0
          while IFS= read -r msg; do
            if [[ ! "$msg" =~ $PATTERN ]]; then
              echo "❌ Invalid commit message: $msg"
              FAILED=1
            else
              echo "✅ $msg"
            fi
          done <<< "$COMMITS"
          if [ $FAILED -eq 1 ]; then
            echo ""
            echo "Commit messages must follow conventional commits format:"
            echo "  type(scope): description"
            echo "  e.g., feat(auth): add JWT refresh token endpoint"
            exit 1
          fi

  all-tests-passed:
    needs: [lint-and-test, commitlint]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check if all checks passed
        run: |
          if [ "${{ needs.lint-and-test.result }}" != "success" ] && [ "${{ needs.lint-and-test.result }}" != "skipped" ]; then
            echo "Some tests failed"
            exit 1
          fi
          if [ "${{ needs.commitlint.result }}" != "success" ] && [ "${{ needs.commitlint.result }}" != "skipped" ]; then
            echo "Commit lint failed"
            exit 1
          fi
          echo "All checks passed!"
