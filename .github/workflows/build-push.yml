name: Build and Push to ECR

on:
  workflow_run:
    workflows: ["CI - Lint and Test"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    outputs:
      services: ${{ steps.set-services.outputs.services }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed services
        id: set-services
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            SERVICES='["auth_service","search_service","cart_service","inventory_service","notification_service","health_copilot"]'
          else
            CHANGED=$(git diff --name-only HEAD^ HEAD | grep '^services/' | cut -d'/' -f2 | sort -u || true)
            if [ -z "$CHANGED" ]; then
              SERVICES='[]'
            else
              SERVICES=$(echo "$CHANGED" | jq -R -s -c 'split("\n")[:-1]')
            fi
          fi
          echo "services=$SERVICES" >> $GITHUB_OUTPUT
          echo "Services to build: $SERVICES"

  build-and-push:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.services != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: ${{ fromJSON(needs.detect-changes.outputs.services) }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        run: |
          # service dir uses underscores (cart_service), k8s uses dashes (cart-service)
          SERVICE_NAME=$(echo "${{ matrix.service }}" | sed 's/_/-/g')
          echo "service-name=$SERVICE_NAME" >> $GITHUB_OUTPUT
          echo "version=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT
          echo "date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: services/${{ matrix.service }}
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/proyecto-final-dev-${{ steps.meta.outputs.service-name }}:${{ steps.meta.outputs.version }}
            ${{ steps.login-ecr.outputs.registry }}/proyecto-final-dev-${{ steps.meta.outputs.service-name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.title=${{ matrix.service }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
            org.opencontainers.image.created=${{ steps.meta.outputs.date }}
            org.opencontainers.image.source=${{ github.repositoryUrl }}
            org.opencontainers.image.revision=${{ github.sha }}

  build-summary:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Build Summary
        run: |
          if [ "${{ needs.build-and-push.result }}" == "success" ]; then
            echo "âś… All images built and pushed successfully"
          else
            echo "âťŚ Some builds failed"
            exit 1
          fi
